name: GoTest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:

    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v5.0.0

    - name: Set up Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.4.0
      with:
        go-version-file: "go.mod"

    - name: Get dependencies
      run: |
        go mod download

    - name: Build and Lint
      run: make build

    - name: Test
      run: |
        make docscheck
        make testnolint
